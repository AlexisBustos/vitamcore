# =========================================================
# VITAM CORE - Nginx server block para core.vitam.tech
# Copiar a: /etc/nginx/sites-available/core.vitam.tech
# Enlazar:   ln -s /etc/nginx/sites-available/core.vitam.tech /etc/nginx/sites-enabled/
# Probar:    nginx -t   |   Recargar: systemctl reload nginx
# SSL:       certbot --nginx -d core.vitam.tech  (agrega el bloque 443 + redirect)
#
# Frontend: SPA React+Vite servida estática desde frontend/dist.
# API: Express en 127.0.0.1:3007 (proxy de /api/).
# =========================================================
server {
    listen 80;
    server_name core.vitam.tech;

    root /home/vitam/apps/vitamcore/frontend/dist;
    index index.html;

    # Límite de subida (por si a futuro se cargan documentos).
    client_max_body_size 25m;

    # API → backend Express (mantiene el prefijo /api).
    location /api/ {
        proxy_pass http://127.0.0.1:3007;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # SPA: cualquier ruta del client-side router cae a index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache de assets con hash (Vite).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
