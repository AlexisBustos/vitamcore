name: CI

# Red de seguridad básica: verifica que backend y frontend compilan/typecheck
# en cada push a las ramas de integración y en cada Pull Request.
on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  backend:
    name: Backend · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      # El build de tsc necesita el cliente Prisma generado (tipos).
      - run: npx prisma generate
      - run: npm run build

  frontend:
    name: Frontend · lint (typecheck)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
